<style>
  :root{
    --ink:#16202b;
    --ink-2:#243443;
    --paper:#f6f4ee;
    --gold:#c9a227;
    --line:#d8d2c4;
    --srb:#c62828;
    --alb:#7b1fa2;
    --hrv:#1565c0;
    --bih:#2e7d32;
    --toll:#ef6c00;
    --shadow:0 6px 22px rgba(16,22,32,.18);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    display:flex;
    flex-direction:column;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    color:var(--ink);
    background:var(--ink);
  }

  /* ---------- Header ---------- */
  header{
    flex:0 0 auto;
    background:linear-gradient(180deg,var(--ink) 0%, var(--ink-2) 100%);
    color:#fff;
    border-bottom:3px solid var(--gold);
    padding:calc(10px + env(safe-area-inset-top,0px)) calc(16px + env(safe-area-inset-right,0px)) 11px calc(16px + env(safe-area-inset-left,0px));
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    gap:10px 24px;
    flex-wrap:wrap;
  }
  .brand{display:flex;flex-direction:column;gap:2px;min-width:0}
  .brand h1{
    margin:0;
    font-size:clamp(15px,2.2vw,20px);
    font-weight:800;
    letter-spacing:.04em;
    text-transform:uppercase;
    line-height:1.15;
  }
  .brand h1 .accent{color:var(--gold)}
  .brand .sub{
    font-size:12px;
    color:#b9c4d1;
    font-weight:500;
    letter-spacing:.01em;
  }
  .src{
    font-size:11.5px;
    color:#aeb9c6;
    text-align:right;
    line-height:1.45;
    max-width:340px;
  }
  .src a{color:var(--gold);text-decoration:none}
  .src a:hover,.src a:focus{text-decoration:underline}

  /* ---------- Map ---------- */
  #map{flex:1 1 auto;width:100%;background:#aad3df}
  .leaflet-container{font:inherit}

  /* ---------- Marker pin ---------- */
  .pin{
    filter:drop-shadow(0 3px 3px rgba(16,22,32,.45));
    cursor:pointer;
    transition:transform .12s ease;
  }
  .pin:hover{transform:translateY(-2px) scale(1.06)}

  /* ---------- Popup ---------- */
  .leaflet-popup-content-wrapper{border-radius:12px;box-shadow:var(--shadow)}
  .leaflet-popup-content{margin:13px 15px;line-height:1.4}
  .pp{min-width:206px;max-width:260px}
  .pp-name{
    font-size:15px;font-weight:800;letter-spacing:.01em;
    padding-left:10px;border-left:4px solid var(--line);margin-bottom:4px;
  }
  .pp-desc{font-size:12.5px;color:#41525f;margin:0 0 9px 0}
  .pp a.cam{
    display:block;text-decoration:none;
    background:var(--ink);color:#fff;
    font-size:12.5px;font-weight:700;
    padding:8px 11px;border-radius:8px;margin-top:6px;
    transition:background .12s ease;
  }
  .pp a.cam:hover,.pp a.cam:focus{background:var(--gold);color:var(--ink)}
  .pp a.cam .arr{opacity:.8;margin-right:5px}
  .pp-note{
    font-size:11px;color:#5d6b78;margin-top:8px;
    border-top:1px dashed var(--line);padding-top:7px;
  }
  .pp-warn{color:#a23b00;font-weight:600}

  /* ---------- Legend ---------- */
  .legend{
    background:rgba(255,255,255,.97);
    border:1px solid var(--line);
    border-radius:11px;
    box-shadow:var(--shadow);
    padding:10px 12px;
    font-size:12.5px;
    color:var(--ink);
    max-width:230px;
  }
  .legend .lg-head{
    display:flex;align-items:center;justify-content:space-between;
    gap:8px;cursor:pointer;user-select:none;font-weight:800;
    letter-spacing:.03em;text-transform:uppercase;font-size:11.5px;
  }
  .legend .lg-head .tog{
    color:#7a8794;font-weight:700;font-size:13px;line-height:1;
    transition:transform .15s ease;
  }
  .legend.collapsed .tog{transform:rotate(-90deg)}
  .legend.collapsed .lg-body{display:none}
  .lg-body{margin-top:9px}
  .lg-row{display:flex;align-items:center;gap:9px;padding:3px 0}
  .lg-dot{
    flex:0 0 auto;width:14px;height:14px;border-radius:50%;
    border:2px solid #fff;box-shadow:0 0 0 1px rgba(16,22,32,.25);
  }
  .lg-row .lg-label{flex:1}
  .lg-row .lg-count{color:#7a8794;font-variant-numeric:tabular-nums}
  .lg-note{
    margin-top:9px;padding-top:8px;border-top:1px solid var(--line);
    font-size:11px;color:#5d6b78;line-height:1.5;
  }
  .lg-note b{color:var(--ink)}

  .leaflet-bar a{color:var(--ink)}

  @media (max-width:640px){
    header{padding:8px 12px 9px}
    .src{text-align:left;max-width:none;flex-basis:100%}
    .legend{max-width:62vw;font-size:12px}
  }

  /* Bezpečné zóny (notch / home indikátor) v režimu „Přidat na plochu" */
  .leaflet-bottom{bottom:env(safe-area-inset-bottom,0px)}
  .leaflet-left{left:env(safe-area-inset-left,0px)}
  .leaflet-right{right:env(safe-area-inset-right,0px)}
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>Stav na hraničních přechodech a&nbsp;mýtných bodech <span class="accent">— Černá Hora</span></h1>
    <div class="sub">Živé kamery hraničních přechodů (MUP) a&nbsp;dálničních bodů (Monteput) · klikněte na značku</div>
  </div>
  <div class="src">
    Odkazy pocházejí z&nbsp;MUP Černé Hory a&nbsp;Monteputu, agregováno přes CdM.<br>
    Zdroj: <a href="https://www.cdm.me/drustvo/pratite-stanje-na-granicama-i-naplatnim-punktovima-228/" target="_blank" rel="noopener">cdm.me — Pratite stanje na granicama i naplatnim punktovima</a>
  </div>
</header>

<div id="map"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
function initMap(){
/* ---------- Kategorie ---------- */
const CAT = {
  SRB:  {label:"Srbsko",                 color:"#c62828"},
  ALB:  {label:"Albánie",                color:"#7b1fa2"},
  HRV:  {label:"Chorvatsko",             color:"#1565c0"},
  BIH:  {label:"Bosna a Hercegovina",    color:"#2e7d32"},
  TOLL: {label:"Mýtné / silniční body",  color:"#ef6c00"}
};

/* Poznámka pro hraniční přechody MUP – sdružená stránka s oběma směry */
const BOTH = "Stránka MUP sdružuje kamery přechodu a zobrazuje oba směry: ulaz = vjezd, izlaz = výjezd.";

/* ---------- Body (skutečné geografické polohy z OSM/GeoNames) ---------- */
const POINTS = [
  /* Hranice se Srbskem */
  {name:"Dračenovac", cat:"SRB", lat:42.90204, lng:20.31840,
   desc:"Hranice se Srbskem · směr Rožaje – Novi Pazar (Špiljani)",
   camLabel:"Kamera MUP — vjezd i výjezd (ulaz/izlaz)",
   url:"http://kamere.mup.gov.me/kamere.php?kamere=Dracenovac&lang=me", note:BOTH},

  {name:"Dobrakovo", cat:"SRB", lat:43.14349, lng:19.78007,
   desc:"Hranice se Srbskem · směr Bijelo Polje – Prijepolje (Gostun)",
   camLabel:"Kamera MUP — vjezd i výjezd (ulaz/izlaz)",
   url:"http://kamere.mup.gov.me/kamere.php?kamere=Dobrakovo&lang=me", note:BOTH},

  {name:"Ranče", cat:"SRB", lat:43.33664, lng:19.47384,
   desc:"Hranice se Srbskem · směr Pljevlja – Prijepolje (Jabuka)",
   camLabel:"Kamera MUP — vjezd i výjezd (ulaz/izlaz)",
   url:"http://kamere.mup.gov.me/kamere.php?kamere=Ranca&lang=me", note:BOTH},

  /* Hranice s Albánií */
  {name:"Božaj", cat:"ALB", lat:42.32964, lng:19.41883,
   desc:"Hranice s Albánií · směr Podgorica – Skadar (Hani i Hotit)",
   camLabel:"Kamera MUP — vjezd i výjezd (ulaz/izlaz)",
   url:"http://kamere.mup.gov.me/kamere.php?kamere=Bozaj&lang=me", note:BOTH},

  {name:"Sukobin", cat:"ALB", lat:42.01636, lng:19.37055,
   desc:"Hranice s Albánií · směr Ulcinj – Skadar (Muriqan)",
   camLabel:"Kamera MUP — vjezd i výjezd (ulaz/izlaz)",
   url:"http://kamere.mup.gov.me/kamere.php?kamere=Sukobin&lang=me",
   note:BOTH, warn:"Pozn.: na stránce MUP je aktuálně živý jen směr výjezd (izlaz); vjezd (ulaz) bez streamu."},

  /* Hranice s Chorvatskem */
  {name:"Debeli Brijeg", cat:"HRV", lat:42.48101, lng:18.45584,
   desc:"Hranice s Chorvatskem · jadranská silnice, směr Herceg Novi – Dubrovnik (Karasovići)",
   camLabel:"Kamera MUP — vjezd i výjezd (ulaz/izlaz)",
   url:"http://kamere.mup.gov.me/kamere.php?kamere=Debeli%20Brijeg&lang=me", note:BOTH},

  /* Hranice s Bosnou a Hercegovinou */
  {name:"Vraćenovići", cat:"BIH", lat:42.86194, lng:18.47980,
   desc:"Hranice s BiH · směr Nikšić – Bileća (Deleuša)",
   camLabel:"Kamera MUP — vjezd i výjezd (ulaz/izlaz)",
   url:"http://kamere.mup.gov.me/kamere.php?kamere=Vracenovici&lang=me", note:BOTH},

  {name:"Šćepan Polje", cat:"BIH", lat:43.34824, lng:18.84777,
   desc:"Hranice s BiH · soutok Tary a Pivy, směr Plužine – Foča / Sarajevo (Hum)",
   camLabel:"Kamera MUP — vjezd i výjezd (ulaz/izlaz)",
   url:"http://kamere.mup.gov.me/kamere.php?kamere=Scepan%20polje&lang=me", note:BOTH},

  {name:"Ilino Brdo", cat:"BIH", lat:42.71292, lng:18.57004,
   desc:"Hranice s BiH · směr Nikšić – Trebinje (Klobuk)",
   camLabel:"Kamera MUP — vjezd i výjezd (ulaz/izlaz)",
   url:"http://kamere.mup.gov.me/kamere.php?kamere=Ilino%20brdo&lang=me", note:BOTH},

  {name:"Sitnica", cat:"BIH", lat:42.56159, lng:18.44405,
   desc:"Hranice s BiH · směr Herceg Novi – Trebinje (Zupci)",
   camLabel:"Kamera MUP — vjezd i výjezd (ulaz/izlaz)",
   url:"http://kamere.mup.gov.me/kamere.php?kamere=Sitnica&lang=me", note:BOTH},

  /* Mýtné / silniční body (Monteput) – jednosměrné kamery */
  {name:"Sozina", cat:"TOLL", lat:42.17222, lng:19.05778,
   desc:"Mýtný bod · tunel Sozina, dálnice A1 Podgorica – Bar (mýto ~2,50 €)",
   camLabel:"Kamera (Monteput)",
   url:"https://www.ipcamlive.com/sozina"},

  {name:"Mateševo", cat:"TOLL", lat:42.76111, lng:19.55333,
   desc:"Mýtný bod · dálnice A1 Bar – Boljare, úsek Smokovac–Mateševo",
   camLabel:"Kamera (Monteput)",
   url:"https://www.ipcamlive.com/matesevo"},

  {name:"Smokovac", cat:"TOLL", lat:42.47974, lng:19.30540,
   desc:"Mýtný bod · dálniční rampa A1 u Podgorice (mýtná stanice, ~3,50 € Bar–Mateševo)",
   camLabel:"Kamera (Monteput)",
   url:"https://www.ipcamlive.com/smokovac"}
];

/* ---------- Mapa ---------- */
const map = L.map("map", {zoomControl:true, minZoom:6, maxZoom:18})
             .setView([42.75, 19.25], 8);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom:19,
  attribution:'&copy; přispěvatelé <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a>'
}).addTo(map);

/* ---------- Tvar značky (barevná „kapka") ---------- */
function pinIcon(color){
  const svg =
    '<svg class="pin" width="28" height="40" viewBox="0 0 28 40" xmlns="http://www.w3.org/2000/svg">'+
      '<path d="M14 0C6.27 0 0 6.27 0 14c0 9.65 14 26 14 26s14-16.35 14-26C28 6.27 21.73 0 14 0z" '+
        'fill="'+color+'" stroke="#ffffff" stroke-width="2.2"/>'+
      '<circle cx="14" cy="14" r="5.1" fill="#ffffff" fill-opacity="0.92"/>'+
    '</svg>';
  return L.divIcon({
    className:"",
    html:svg,
    iconSize:[28,40],
    iconAnchor:[14,40],
    popupAnchor:[0,-34]
  });
}

/* ---------- Vykreslení bodů ---------- */
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

const counts = {SRB:0,ALB:0,HRV:0,BIH:0,TOLL:0};
const bounds = [];

POINTS.forEach(p=>{
  const c = CAT[p.cat];
  counts[p.cat]++;
  bounds.push([p.lat,p.lng]);

  let html =
    '<div class="pp">'+
      '<div class="pp-name" style="border-left-color:'+c.color+'">'+esc(p.name)+'</div>'+
      '<div class="pp-desc">'+esc(p.desc)+'</div>'+
      '<a class="cam" href="'+p.url+'" target="_blank" rel="noopener">'+
        '<span class="arr">▶</span>'+esc(p.camLabel)+
      '</a>';
  if(p.warn) html += '<div class="pp-note pp-warn">'+esc(p.warn)+'</div>';
  if(p.note) html += '<div class="pp-note">'+esc(p.note)+'</div>';
  html += '</div>';

  L.marker([p.lat,p.lng], {icon:pinIcon(c.color), title:p.name, riseOnHover:true})
   .addTo(map)
   .bindPopup(html, {maxWidth:280, autoPanPadding:[24,24]});
});

/* Výřez tak, aby byly vidět všechny body */
map.fitBounds(bounds, {padding:[42,42]});

/* ---------- Legenda ---------- */
const legend = L.control({position:"bottomright"});
legend.onAdd = function(){
  const div = L.DomUtil.create("div","legend");
  L.DomEvent.disableClickPropagation(div);
  L.DomEvent.disableScrollPropagation(div);

  let rows = "";
  Object.keys(CAT).forEach(k=>{
    rows +=
      '<div class="lg-row">'+
        '<span class="lg-dot" style="background:'+CAT[k].color+'"></span>'+
        '<span class="lg-label">'+CAT[k].label+'</span>'+
        '<span class="lg-count">'+counts[k]+'</span>'+
      '</div>';
  });

  div.innerHTML =
    '<div class="lg-head" role="button" tabindex="0" aria-label="Sbalit / rozbalit legendu">'+
      '<span>Legenda · '+POINTS.length+' bodů</span><span class="tog">▾</span>'+
    '</div>'+
    '<div class="lg-body">'+
      rows +
      '<div class="lg-note">'+
        '<b>ulaz</b> = vjezd · <b>izlaz</b> = výjezd. Stránky MUP zobrazují u přechodů oba směry. '+
        'Mýtné body (Monteput) jsou jednosměrné kamery. Odkazy se otevírají v nové záložce.'+
      '</div>'+
    '</div>';

  const head = div.querySelector(".lg-head");
  const toggle = ()=>div.classList.toggle("collapsed");
  head.addEventListener("click", toggle);
  head.addEventListener("keydown", e=>{ if(e.key==="Enter"||e.key===" "){e.preventDefault();toggle();} });

  /* Na úzkých displejích legendu výchozí sbalit */
  if (window.matchMedia("(max-width:640px)").matches) div.classList.add("collapsed");

  return div;
};
legend.addTo(map);
}

/* ---- Bootstrap: spustí mapu až po načtení Leafletu, s fallbackem na druhý CDN ---- */
(function(){
  function fail(){
    var el=document.getElementById("map");
    if(el) el.innerHTML='<div style="padding:26px;font:14px/1.55 -apple-system,Segoe UI,Roboto,sans-serif;color:#fff">Nepodařilo se načíst knihovnu Leaflet z\u00a0CDN. Otevřete prosím tento soubor v\u00a0běžném prohlížeči s\u00a0připojením k\u00a0internetu.</div>';
  }
  if(typeof L!=="undefined"){ initMap(); return; }
  var s=document.createElement("script");
  s.src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js";
  s.onload=function(){ (typeof L!=="undefined") ? initMap() : fail(); };
  s.onerror=fail;
  document.head.appendChild(s);
})();
</script>
</body>
</html>
